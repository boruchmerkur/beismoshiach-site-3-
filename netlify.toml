# Netlify config for beismoshiach.org
[build]
  publish = "."

[build.environment]
  LILY_SITE = "beismoshiach"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

[[redirects]]
  from = "/api/lily"
  to = "/.netlify/functions/lily-collect"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' https: data:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://dreamsitedesign.com https://cdnjs.cloudflare.com; connect-src 'self' https://dreamsitedesign.com; frame-src https://www.moshiach101.info https://moshiach101.info; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"
